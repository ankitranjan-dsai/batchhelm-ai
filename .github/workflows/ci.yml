name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        working-directory: services/api
        run: uv sync --extra dev
      - name: Run tests
        working-directory: services/api
        run: uv run pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Build
        working-directory: apps/web
        run: npm run build

  attribution:
    name: Attribution scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check attribution language
        run: ./scripts/check-attribution.sh

  docker:
    name: Docker + deployment bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t batchhelm-api:ci .
      - name: Build dashboard image
        run: docker build -t batchhelm-web:ci apps/web
      - name: Validate production Compose
        env:
          BATCHHELM_REVISION: ci
          PUBLIC_ORIGIN: http://localhost
          QWEN_API_KEY: ci-placeholder
          QWEN_PROOF_TOKEN: ci-placeholder
        run: docker compose -f deploy/alibaba-ecs/compose.yaml config --quiet
