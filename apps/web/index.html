      <style>
        .noscript-fallback {
          min-height: 100vh;

          font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
          color: #082033;
          background: #f7fafb;

          padding: 28px;
          background: #ffffff;

          border-radius: 10px;

        .noscript-card h1 { margin: 0 0 10px; font-size: 22px; }

      </style>
      <div class="noscript-fallback">
